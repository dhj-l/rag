  #       condition: service_healthy
  #   volumes:
  #     - ./uploads:/app/uploads
  #
  # frontend:
  #   build: ./frontend
  #   container_name: doc-assistant-frontend
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
